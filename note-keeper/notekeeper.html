<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Notes Keeper</title>

<style>
    body {
        font-family: Arial;
        background: #0f172a;
        color: white;
        text-align: center;
    }
    .container {
        width: 400px;
        margin: 30px auto;
        background: #1e293b;
        padding: 20px;
        border-radius: 10px;
    }
    input, textarea, button {
        width: 90%;
        margin: 5px;
        padding: 10px;
        border-radius: 5px;
        border: none;
    }
    button {
        background: #22c55e;
        cursor: pointer;
    }
    .note {
        background: #334155;
        margin: 10px;
        padding: 10px;
        border-radius: 5px;
        text-align: left;
    }
</style>
</head>

<body>

<!-- LOGIN -->
<div class="container" id="loginBox">
    <h2>Login</h2>
    <input type="text" id="user" placeholder="Username">
    <input type="password" id="pass" placeholder="Password">
    <button onclick="login()">Login</button>
</div>

<!-- NOTES APP -->
<div class="container" id="appBox" style="display:none;">
    <h2>Notes Keeper</h2>

    <input type="text" id="title" placeholder="Note Title">
    <textarea id="content" placeholder="Write your note..."></textarea>
    <button onclick="addNote()">Save Note</button>

    <input type="text" id="search" placeholder="Search notes..." onkeyup="searchNotes()">

    <div id="notesList"></div>

    <button onclick="logout()">Logout</button>
</div>

<script>
let notes = JSON.parse(localStorage.getItem("notes")) || [];
let editIndex = -1;

function login() {
    let u = document.getElementById("user").value;
    let p = document.getElementById("pass").value;

    if (u && p) {
        localStorage.setItem("user", u);
        document.getElementById("loginBox").style.display = "none";
        document.getElementById("appBox").style.display = "block";
        renderNotes();
    } else {
        alert("Enter login details");
    }
}

function logout() {
    localStorage.removeItem("user");
    location.reload();
}

function addNote() {
    let title = document.getElementById("title").value;
    let content = document.getElementById("content").value;

    if (!title || !content) return;

    if (editIndex === -1) {
        notes.push({ title, content });
    } else {
        notes[editIndex] = { title, content };
        editIndex = -1;
    }

    localStorage.setItem("notes", JSON.stringify(notes));

    document.getElementById("title").value = "";
    document.getElementById("content").value = "";

    renderNotes();
}

function renderNotes(filtered = notes) {
    let list = document.getElementById("notesList");
    list.innerHTML = "";

    filtered.forEach((note, index) => {
        let div = document.createElement("div");
        div.className = "note";
        div.innerHTML = `
            <h3>${note.title}</h3>
            <p>${note.content}</p>
            <button onclick="editNote(${index})">Edit</button>
            <button onclick="deleteNote(${index})">Delete</button>
        `;
        list.appendChild(div);
    });
}

function deleteNote(index) {
    notes.splice(index, 1);
    localStorage.setItem("notes", JSON.stringify(notes));
    renderNotes();
}

function editNote(index) {
    document.getElementById("title").value = notes[index].title;
    document.getElementById("content").value = notes[index].content;
    editIndex = index;
}

function searchNotes() {
    let keyword = document.getElementById("search").value.toLowerCase();

    let filtered = notes.filter(n =>
        n.title.toLowerCase().includes(keyword) ||
        n.content.toLowerCase().includes(keyword)
    );

    renderNotes(filtered);
}

// Auto login
if (localStorage.getItem("user")) {
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("appBox").style.display = "block";
    renderNotes();
}
</script>

</body>
</html>
